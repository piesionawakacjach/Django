<!DOCTYPE html>
<html lang="pl" data-theme="moderate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            scroll-behavior: smooth;
        }

        :root,
        html[data-theme="moderate"] {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.8);
            --shadow: rgba(0, 0, 0, 0.15);
        }

        html[data-theme="light"] {
            --primary-gradient: linear-gradient(135deg, #f8fbff 0%, #dbeafe 100%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(30, 64, 175, 0.15);
            --text-main: #172033;
            --text-muted: rgba(23, 32, 51, 0.75);
            --shadow: rgba(30, 64, 175, 0.12);
        }

        html[data-theme="dark"] {
            --primary-gradient: linear-gradient(135deg, #0f172a 0%, #312e81 100%);
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --shadow: rgba(0, 0, 0, 0.35);
        }

        body {
            background: var(--primary-gradient) !important;
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.35s ease, color 0.35s ease;
        }

        .navbar-custom,
        .footer-custom {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(12px) !important;
            border-color: var(--glass-border);
            box-shadow: 0 2px 15px var(--shadow);
        }

        .navbar-custom {
            border-bottom: 1px solid var(--glass-border);
        }

        .footer-custom {
            border-top: 1px solid var(--glass-border);
            margin-top: 3rem;
            padding: 2rem 0;
        }

        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-main) !important;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 0.5rem;
            color: white;
            font-size: 1.25rem;
        }

        .nav-link-custom {
            color: var(--text-muted) !important;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link-custom:hover {
            color: var(--text-main) !important;
            transform: translateY(-2px);
        }

        .user-badge,
        .social-icon-btn,
        .theme-switcher {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .user-badge {
            border-radius: 25px;
            padding: 0.5rem 1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            border: none !important;
            color: white !important;
            font-weight: 600;
            padding: 0.6rem 1.5rem !important;
            border-radius: 25px !important;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4) !important;
        }

        .theme-switcher {
            border-radius: 25px;
            padding: 0.35rem 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-switcher select {
            background: transparent;
            color: var(--text-main);
            border: none;
            outline: none;
            font-weight: 600;
        }

        .theme-switcher option {
            color: #111827;
        }

        main {
            min-height: calc(100vh - 140px);
            padding: 2rem 0;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .social-icons-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: var(--text-muted);
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .social-icon-btn:hover {
            color: var(--text-main);
            transform: translateY(-3px);
        }

        .navbar-toggler {
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            padding: 0.25rem;
        }

        .navbar-toggler:focus {
            box-shadow: none;
            outline: 1px solid var(--glass-border);
            border-radius: 0.375rem;
        }

        @media (max-width: 576px) {
            .user-badge {
                display: none !important;
            }

            .navbar-brand-custom {
                font-size: 1.25rem;
            }

            main {
                padding: 1rem 0;
                min-height: calc(100vh - 120px);
            }
        }
    </style>

    <title>{% block title %}DevBoard{% endblock %}</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand-custom" href="/">
                <div class="logo-icon">
                    <i class="fas fa-th-large"></i>
                </div>
                <span>DevBoard</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <i class="fas fa-bars"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-center gap-3">

                    <li class="nav-item">
                        <div class="theme-switcher">
                            <i class="fas fa-palette"></i>
                            <select id="themeSelect" aria-label="Wybierz motyw">
                                <option value="light">Jasny</option>
                                <option value="moderate">Umiarkowany</option>
                                <option value="dark">Ciemny</option>
                            </select>
                        </div>
                    </li>

                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <span class="user-badge">
                                <i class="fas fa-user-circle"></i>
                                <span>{{ user.username }}</span>
                            </span>
                        </li>

                        <li class="nav-item">
                            <form action="{% url 'logout' %}" method="post" class="mb-0">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-gradient nav-link-custom">
                                    <i class="fas fa-sign-out-alt"></i>
                                    <span>Wyloguj</span>
                                </button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a href="{% url 'login' %}" class="btn btn-gradient">
                                <i class="fas fa-sign-in-alt"></i>
                                <span>Zaloguj</span>
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid">
        <div class="container-xxl">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer-custom">
        <div class="container-fluid">
            <div class="text-center">
                <p class="footer-text mb-2">
                    <i class="fas fa-copyright"></i> 2026 DevBoard. Wszystkie prawa zastrzeżone.
                </p>

                <div class="social-icons-container">
                    <a href="#" class="social-icon-btn" title="GitHub" aria-label="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="#" class="social-icon-btn" title="Twitter" aria-label="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" class="social-icon-btn" title="LinkedIn" aria-label="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const themeSelect = document.getElementById('themeSelect');
        const savedTheme = localStorage.getItem('devboard-theme') || 'moderate';

        document.documentElement.setAttribute('data-theme', savedTheme);
        themeSelect.value = savedTheme;

        themeSelect.addEventListener('change', function () {
            const selectedTheme = this.value;

            document.documentElement.setAttribute('data-theme', selectedTheme);
            localStorage.setItem('devboard-theme', selectedTheme);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
