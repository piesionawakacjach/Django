<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            scroll-behavior: smooth;
        }

        :root {
            --bs-body-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: var(--primary-gradient) !important;
            min-height: 100vh;
        }

        /* Navbar Glass Effect */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.15);
        }

        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.5rem;
            color: white !important;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }

        .navbar-brand-custom:hover {
            color: rgba(255, 255, 255, 0.9) !important;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: var(--primary-gradient);
            border-radius: 0.5rem;
            color: white;
            font-size: 1.25rem;
        }

        .nav-link-custom {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link-custom:hover {
            color: white !important;
            transform: translateY(-2px);
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 25px;
            padding: 0.5rem 1rem;
            color: white;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .user-badge:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .btn-gradient {
            background: var(--primary-gradient) !important;
            border: none !important;
            color: white !important;
            font-weight: 600;
            padding: 0.6rem 1.5rem !important;
            border-radius: 25px !important;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-gradient:hover {
            color: white !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4) !important;
        }

        .btn-gradient:active,
        .btn-gradient:focus {
            transform: translateY(0) !important;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3) !important;
        }

        /* Main Content */
        main {
            min-height: calc(100vh - 140px);
            padding: 2rem 0;
        }

        /* Footer Glass Effect */
        .footer-custom {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 3rem;
            padding: 2rem 0;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
        }

        .social-icons-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.75);
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .social-icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.35);
        }

        /* Responsive */
        @media (max-width: 576px) {
            .user-badge {
                display: none !important;
            }

            .navbar-brand-custom {
                font-size: 1.25rem;
            }

            main {
                padding: 1rem 0;
                min-height: calc(100vh - 120px);
            }
        }

        /* Navbar Toggler Custom */
        .navbar-toggler {
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 0.25rem;
        }

        .navbar-toggler:focus {
            box-shadow: none;
            outline: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 0.375rem;
        }
    </style>
    <title>{% block title %}DevBoard{% endblock %}</title>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand-custom" href="/">
                <div class="logo-icon">
                    <i class="fas fa-th-large"></i>
                </div>
                <span>DevBoard</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                    aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <span class="user-badge">
                                <i class="fas fa-user-circle"></i>
                                <span>{{ user.username }}</span>
                            </span>
                        </li>
                        <li class="nav-item">
                            <form action="{% url 'logout' %}" method="post" class="mb-0">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-gradient nav-link-custom">
                                    <i class="fas fa-sign-out-alt"></i>
                                    <span>Wyloguj</span>
                                </button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a href="{% url 'login' %}" class="btn btn-gradient">
                                <i class="fas fa-sign-in-alt"></i>
                                <span>Zaloguj</span>
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid">
        <div class="container-xxl">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-custom">
        <div class="container-fluid">
            <div class="text-center">
                <p class="footer-text mb-2">
                    <i class="fas fa-copyright"></i> 2026 DevBoard. Wszystkie prawa zastrzeżone.
                </p>
                <div class="social-icons-container">
                    <a href="#" class="social-icon-btn" title="GitHub" aria-label="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="#" class="social-icon-btn" title="Twitter" aria-label="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" class="social-icon-btn" title="LinkedIn" aria-label="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
